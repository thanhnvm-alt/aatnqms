
<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Quản lý QA/QC AATN</title>
    
    <script>
      window.global = window;
      window.process = window.process || { env: {} };
      // Minimal Buffer polyfill for browser compatibility
      if (typeof window.Buffer === 'undefined') {
        window.Buffer = {
          isBuffer: () => false,
          from: (data) => data,
          alloc: (size) => new Uint8Array(size),
          concat: (list) => {
            let totalLength = list.reduce((acc, curr) => acc + curr.length, 0);
            let result = new Uint8Array(totalLength);
            let offset = 0;
            for (let item of list) {
              result.set(item, offset);
              offset += item.length;
            }
            return result;
          }
        };
      }
    </script>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <!-- Load PDF.js for Floor Plan rendering -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

    <style>
      :root {
        --sat: env(safe-area-inset-top);
        --sab: env(safe-area-inset-bottom);
        --sal: env(safe-area-inset-left);
        --sar: env(safe-area-inset-right);
      }
      
      html {
        height: 100%;
        width: 100%;
      }
      body { 
        font-family: 'Inter', sans-serif; 
        overscroll-behavior-y: contain;
        -webkit-tap-highlight-color: transparent;
        width: 100%;
        overflow-x: hidden;
        font-size: 14px;
        line-height: 1.5;
        height: 100vh; /* Fallback for browsers that do not support dvh */
        height: 100dvh;
        margin: 0;
        padding: 0;
      }
      
      #root {
        height: 100%;
        width: 100%;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }
      
      ::-webkit-scrollbar { width: 4px; height: 4px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
      
      .safe-pb { padding-bottom: var(--sab); }
      .safe-pt { padding-top: var(--sat); }
      
      @keyframes slideUp { from { transform: translateY(10px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
      .page-enter { animation: slideUp 0.3s ease-out forwards; }

      .no-scroll-x { overflow-x: hidden; }
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      
      svg { width: auto; height: auto; }
      
      /* Mobile optimization for long lists */
      .inspection-item-card {
        touch-action: pan-y;
        -webkit-user-drag: none;
      }
    </style>
  </head>
  <body class="bg-slate-50 text-slate-900 selection:bg-blue-100 no-scroll-x">
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
