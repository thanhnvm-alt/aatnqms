
<!DOCTYPE html>

  <head>
    <meta charset="UTF-8" />

    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Quản lý QA/QC AATN</title>
    
    <script>
      window.global = window;
      window.process = window.process || { env: {} };
      // Minimal Buffer polyfill for browser compatibility
      if (typeof window.Buffer === 'undefined') {
        window.Buffer = {
          isBuffer: () => false,
          from: (data) => data,
          alloc: (size) => new Uint8Array(size),
          concat: (list) => {
            let totalLength = list.reduce((acc, curr) => acc + curr.length, 0);
            let result = new Uint8Array(totalLength);
            let offset = 0;
            for (let item of list) {
              result.set(item, offset);
              offset += item.length;
            }
            return result;
          }
        };
      }
    </script>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <!-- Load SheetJS directly -->
    <script src="https://cdn.sheetjs.com/xlsx-0.19.3/package/dist/xlsx.full.min.js"></script>
    
    <!-- Load PDF.js for Floor Plan rendering -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

    <style>
      :root {
        --sat: env(safe-area-inset-top);
        --sab: env(safe-area-inset-bottom);
        --sal: env(safe-area-inset-left);
        --sar: env(safe-area-inset-right);
      }
      
      body { 
        font-family: 'Inter', sans-serif; 
        overscroll-behavior-y: none;
        -webkit-tap-highlight-color: transparent;
        width: 100%;
        overflow-x: hidden;
        font-size: 14px;
        line-height: 1.5;
      }
      
      ::-webkit-scrollbar { width: 4px; height: 4px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
      
      .safe-pb { padding-bottom: var(--sab); }
      .safe-pt { padding-top: var(--sat); }
      
      @keyframes slideUp { from { transform: translateY(10px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
      .page-enter { animation: slideUp 0.3s ease-out forwards; }

      .no-scroll-x { overflow-x: hidden; }
      
      svg { width: auto; height: auto; }
    </style>
  </head>
  <body class="bg-slate-50 text-slate-900 h-[100dvh] selection:bg-blue-100 no-scroll-x">
    <div id="root" class="h-full w-full"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
